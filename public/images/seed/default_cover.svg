<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15120d"/>
      <stop offset="50%" stop-color="#241e17"/>
      <stop offset="100%" stop-color="#15120d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b89047" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#e8d8b9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b89047" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" fill="url(#bg)"/>
  <!-- Subtle architectural grid lines -->
  <line x1="0" y1="125" x2="1600" y2="125" stroke="url(#gold)" stroke-width="1"/>
  <line x1="0" y1="250" x2="1600" y2="250" stroke="url(#gold)" stroke-width="1"/>
  <line x1="0" y1="375" x2="1600" y2="375" stroke="url(#gold)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="url(#gold)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="500" stroke="url(#gold)" stroke-width="1"/>
  <line x1="1200" y1="0" x2="1200" y2="500" stroke="url(#gold)" stroke-width="1"/>
  <circle cx="800" cy="250" r="140" fill="none" stroke="#b89047" stroke-width="2" opacity="0.15"/>
  <circle cx="800" cy="250" r="180" fill="none" stroke="#b89047" stroke-width="1" opacity="0.1"/>
</svg>
