<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" fill="#1d1f21" rx="16"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#c5a059" stroke-width="3" opacity="0.4"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="#c5a059" stroke-width="1.5" opacity="0.2"/>
  <g transform="translate(100,85) scale(0.85)">
    <!-- Classical Greek Temple Pediment & Columns -->
    <polygon points="0,-48 -64,-20 64,-20" fill="#c5a059"/>
    <rect x="-64" y="-18" width="128" height="6" fill="#c5a059"/>
    <!-- Columns -->
    <rect x="-54" y="-10" width="10" height="46" fill="#e8d8b9"/>
    <rect x="-30" y="-10" width="10" height="46" fill="#e8d8b9"/>
    <rect x="-6" y="-10" width="12" height="46" fill="#e8d8b9"/>
    <rect x="20" y="-10" width="10" height="46" fill="#e8d8b9"/>
    <rect x="44" y="-10" width="10" height="46" fill="#e8d8b9"/>
    <!-- Base -->
    <rect x="-66" y="36" width="132" height="6" fill="#c5a059"/>
    <rect x="-72" y="42" width="144" height="8" fill="#c5a059"/>
  </g>
  <text x="100" y="156" font-family="'Cinzel', 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">THE BRITISH</text>
  <text x="100" y="172" font-family="'Cinzel', 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#c5a059" text-anchor="middle" letter-spacing="3">MUSEUM</text>
