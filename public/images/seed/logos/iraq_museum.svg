  </g>
  <text x="100" y="152" font-family="'Cinzel', 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">IRAQ MUSEUM</text>
  <text x="100" y="168" font-family="sans-serif" font-size="9" font-weight="600" fill="#c5a059" text-anchor="middle" letter-spacing="3">BAGHDAD • EST. 1923</text>
